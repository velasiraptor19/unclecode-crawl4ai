name: Build Crawl4AI Image

on:
  workflow_dispatch:
    inputs:
      install_type:
        description: Install type passed to Docker build
        required: true
        default: all
        type: choice
        options:
          - default
          - torch
          - transformer
          - all
      enable_gpu:
        description: Set Docker ENABLE_GPU build arg. Free GitHub runners do not provide GPUs.
        required: true
        default: false
        type: boolean
  push:
    branches:
      - aio-published-v0.9.2-provenance
    paths:
      - Dockerfile
      - pyproject.toml
      - setup.py
      - requirements.txt
      - deploy/docker/**
      - crawl4ai/**
      - .github/workflows/build-ghcr.yml
      - .dockerignore
      - tests/docker/**

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  C4AI_VERSION: 0.9.2
  INSTALL_TYPE: ${{ inputs.install_type || 'all' }}
  ENABLE_GPU: ${{ inputs.enable_gpu || false }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Show selected build args
        run: |
          echo "INSTALL_TYPE=${INSTALL_TYPE}"
          echo "ENABLE_GPU=${ENABLE_GPU}"
          if [ "${ENABLE_GPU}" = "true" ]; then
            echo "ENABLE_GPU=true on free GitHub-hosted runners is best-effort only."
            echo "There is no free GPU runner, and CUDA install may exceed the runner disk budget."
          fi

      - name: Compute image tags
        id: tags
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          SHORT_SHA="${GITHUB_SHA::7}"
          if [ "${ENABLE_GPU}" = "true" ]; then
            {
              echo "tags<<EOF"
              echo "${IMAGE}:${INSTALL_TYPE}-gpu-preload"
              echo "${IMAGE}:v${C4AI_VERSION}-${INSTALL_TYPE}-gpu-preload"
              echo "${IMAGE}:sha-${SHORT_SHA}-${INSTALL_TYPE}-gpu-preload"
              echo "EOF"
              echo "smoke_image=${IMAGE}:sha-${SHORT_SHA}-${INSTALL_TYPE}-gpu-preload"
            } >> "${GITHUB_OUTPUT}"
          else
            {
              echo "tags<<EOF"
              echo "${IMAGE}:latest"
              echo "${IMAGE}:${INSTALL_TYPE}"
              echo "${IMAGE}:${INSTALL_TYPE}-cpu-preload"
              echo "${IMAGE}:v${C4AI_VERSION}-${INSTALL_TYPE}-cpu-preload"
              echo "${IMAGE}:sha-${SHORT_SHA}-${INSTALL_TYPE}-cpu-preload"
              echo "EOF"
              echo "smoke_image=${IMAGE}:sha-${SHORT_SHA}-${INSTALL_TYPE}-cpu-preload"
            } >> "${GITHUB_OUTPUT}"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            INSTALL_TYPE=${{ env.INSTALL_TYPE }}
            ENABLE_GPU=${{ env.ENABLE_GPU }}
            PRELOAD_MODELS=true
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true,scope=${{ github.ref_name }}

      - name: Smoke test published CPU image
        if: env.ENABLE_GPU == 'false'
        run: tests/docker/smoke-test.sh "${{ steps.tags.outputs.smoke_image }}"
