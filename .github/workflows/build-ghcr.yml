name: Build Crawl4AI AIO Image

on:
  workflow_dispatch:
    inputs:
      install_type:
        description: Future image variant selector; this release only accepts all
        required: true
        default: all
        type: choice
        options:
          - all
      enable_gpu:
        description: Future GPU selector; this release only accepts false
        required: true
        default: false
        type: boolean
  push:
    branches:
      - aio-v0.9.2-web-stack-latest
      - aio-v0.9.2-mcp-config-output-control
    paths:
      - Dockerfile
      - pyproject.toml
      - uv.lock
      - aio/runtime/**
      - aio/searxng/**
      - aio/camoufox/**
      - setup.py
      - requirements.txt
      - deploy/docker/**
      - crawl4ai/**
      - .github/workflows/build-ghcr.yml
      - .dockerignore
      - tests/docker/**
      - tests/mcp/**
      - aio/provenance/**
      - scripts/aio-provenance-*
      - scripts/aio_provenance.py
      - scripts/aio-camoufox-verify
      - tests/aio_provenance/**

permissions:
  contents: read
  packages: write

concurrency:
  group: build-ghcr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  C4AI_VERSION: 0.9.2
  AIO_IMAGE_REVISION: 3
  INSTALL_TYPE: ${{ inputs.install_type || 'all' }}
  ENABLE_GPU: ${{ inputs.enable_gpu || false }}

jobs:
  build-test-promote:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run pre-build AIO contract tests
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check --no-cache-dir \
            pytest==8.4.2 PyYAML==6.0.3
          python -m pytest -q \
            tests/docker/test_aio_camoufox_static.py \
            tests/docker/test_aio_searxng_static.py \
            tests/docker/test_candidate_verification_architecture.py \
            tests/docker/test_build_ghcr_workflow.py
          python -m py_compile \
            deploy/docker/mcp_bridge.py \
            tests/docker/verify_aio_rest.py \
            tests/docker/verify_runtime.py \
            tests/docker/verify_searxng.py \
            tests/mcp/test_mcp_http.py
          bash -n tests/docker/smoke-test.sh

      - name: Require a tested AIO ref and variant
        shell: bash
        run: |
          set -euo pipefail
          case "${GITHUB_REF}" in
            refs/heads/aio-v0.9.2-web-stack-latest|refs/heads/aio-v0.9.2-mcp-config-output-control) ;;
            *) echo "Ref ${GITHUB_REF} is not an approved AIO build ref." >&2; exit 1 ;;
          esac
          if [[ "${GITHUB_REF}" != "refs/heads/aio-v0.9.2-web-stack-latest" ]]; then
            echo "Ref ${GITHUB_REF} is candidate-only and cannot publish final tags."
          fi
          if [[ "${INSTALL_TYPE}" != "all" || "${ENABLE_GPU}" != "false" ]]; then
            echo "Only INSTALL_TYPE=all, ENABLE_GPU=false, PRELOAD_MODELS=true is tested for v${C4AI_VERSION}." >&2
            exit 1
          fi

      - name: Verify locked AIO provenance offline
        id: provenance
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          scripts/aio-provenance-verify \
            --spec aio/provenance/components.json \
            --lock aio/provenance/components.lock.json
          scripts/aio-camoufox-verify --online
          python3 - <<'PY' >> "${GITHUB_OUTPUT}"
          import json

          lock = json.load(open("aio/provenance/components.lock.json", encoding="utf-8"))
          crawl4ai = next(item for item in lock["components"] if item["name"] == "crawl4ai")
          crawl4ai_source = crawl4ai["evidence"]["source"]
          searxng = next(item for item in lock["components"] if item["name"] == "searxng")
          searxng_source = searxng["evidence"]["source"]
          camoufox = json.load(open("aio/camoufox/components.lock.json", encoding="utf-8"))
          print(f"index_digest={crawl4ai['index_digest']}")
          print(f"platform_digest={crawl4ai['platform_digest']}")
          print(f"release_commit={crawl4ai_source['release_commit']}")
          print(f"published_source_commit={crawl4ai_source['published_source_commit']}")
          print(f"searxng_index_digest={searxng['index_digest']}")
          print(f"searxng_platform_digest={searxng['platform_digest']}")
          print(f"searxng_version={searxng['evidence']['version']}")
          print(f"searxng_source_commit={searxng_source['published_source_commit']}")
          print(f"camoufox_package_version={camoufox['python_package']['version']}")
          print(f"camoufox_browser_version={camoufox['browser']['version']}")
          print(f"camoufox_browser_sha256={camoufox['browser']['sha256']}")
          PY

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          # Override the action's security.insecure/network.host defaults; this build uses neither.
          buildkitd-flags: --oci-worker-gc

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute candidate and final tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          image="${REGISTRY}/${IMAGE_NAME}"
          candidate="${image}:candidate-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-aio-web-all-cpu-preload"
          {
            echo "candidate=${candidate}"
            echo "protected_tags<<EOF"
            echo "${image}:v${C4AI_VERSION}-r${AIO_IMAGE_REVISION}-aio-web-all-cpu-preload"
            echo "${image}:sha-${GITHUB_SHA}-aio-web-all-cpu-preload"
            echo "EOF"
            echo "final_tags<<EOF"
            echo "${image}:aio-web-latest"
            echo "${image}:aio-web-all-cpu-preload"
            echo "${image}:v${C4AI_VERSION}-r${AIO_IMAGE_REVISION}-aio-web-all-cpu-preload"
            echo "${image}:sha-${GITHUB_SHA}-aio-web-all-cpu-preload"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push non-release candidate
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          pull: true
          push: true
          tags: ${{ steps.tags.outputs.candidate }}
          build-args: |
            INSTALL_TYPE=all
            ENABLE_GPU=false
            PRELOAD_MODELS=true
            AIO_IMAGE_REVISION=${{ env.AIO_IMAGE_REVISION }}
            SOURCE_COMMIT=${{ github.sha }}
            AIO_PROVENANCE_INDEX_DIGEST=${{ steps.provenance.outputs.index_digest }}
            AIO_PROVENANCE_RELEASE_COMMIT=${{ steps.provenance.outputs.release_commit }}
            AIO_SEARXNG_INDEX_DIGEST=${{ steps.provenance.outputs.searxng_index_digest }}
            AIO_SEARXNG_PLATFORM_DIGEST=${{ steps.provenance.outputs.searxng_platform_digest }}
            AIO_SEARXNG_VERSION=${{ steps.provenance.outputs.searxng_version }}
            AIO_SEARXNG_SOURCE_COMMIT=${{ steps.provenance.outputs.searxng_source_commit }}
            AIO_CAMOUFOX_PACKAGE_VERSION=${{ steps.provenance.outputs.camoufox_package_version }}
            AIO_CAMOUFOX_BROWSER_VERSION=${{ steps.provenance.outputs.camoufox_browser_version }}
            AIO_CAMOUFOX_BROWSER_SHA256=${{ steps.provenance.outputs.camoufox_browser_sha256 }}

      - name: Run smoke, runtime, MCP, and browser tests against candidate digest
        id: smoke
        continue-on-error: true
        shell: bash
        env:
          SMOKE_ARTIFACT_DIR: ${{ runner.temp }}/aio-candidate-verification
        run: |
          set -euo pipefail
          tests/docker/smoke-test.sh \
            "${{ steps.tags.outputs.candidate }}@${{ steps.build.outputs.digest }}"

      - name: Publish complete candidate verification summary
        if: always() && steps.build.outcome == 'success'
        shell: bash
        run: |
          report="${RUNNER_TEMP}/aio-candidate-verification/report.md"
          if [[ -f "${report}" ]]; then
            cat "${report}" >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "Candidate verification did not produce a report." >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload complete candidate verification evidence
        if: always() && steps.build.outcome == 'success'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: aio-candidate-verification-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/aio-candidate-verification
          if-no-files-found: error
          retention-days: 30

      - name: Require complete candidate verification
        if: always() && steps.build.outcome == 'success'
        shell: bash
        run: |
          test "${{ steps.smoke.outcome }}" = "success"

      - name: Promote exact tested digest to final tags
        if: github.ref == 'refs/heads/aio-v0.9.2-web-stack-latest'
        id: promote
        shell: bash
        env:
          CANDIDATE_IMAGE: ${{ steps.tags.outputs.candidate }}
          CANDIDATE_DIGEST: ${{ steps.build.outputs.digest }}
          PROTECTED_TAGS: ${{ steps.tags.outputs.protected_tags }}
          FINAL_TAGS: ${{ steps.tags.outputs.final_tags }}
        run: |
          set -euo pipefail

          require_current_branch_tip() {
            local remote_sha
            remote_sha="$(git ls-remote --exit-code --refs origin "${GITHUB_REF}" | awk 'NR == 1 {print $1}')"
            if [[ -z "${remote_sha}" || "${remote_sha}" != "${GITHUB_SHA}" ]]; then
              echo "Refusing promotion: ${GITHUB_SHA} is not the current ${GITHUB_REF} tip (${remote_sha:-missing})." >&2
              exit 1
            fi
          }

          digest_from_inspection() {
            local tag="$1" inspection="$2" digest
            digest="$(awk '$1 == "Digest:" {print $2; exit}' <<< "${inspection}")"
            if [[ ! "${digest}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              echo "Could not determine registry digest for ${tag}." >&2
              exit 1
            fi
            printf '%s\n' "${digest}"
          }

          # Cancellation is advisory; an older run must also fail on a moved ref.
          require_current_branch_tip

          while IFS= read -r tag; do
            [[ -n "${tag}" ]] || continue
            set +e
            inspection="$(docker buildx imagetools inspect "${tag}" 2>&1)"
            inspect_status=$?
            set -e
            if [[ ${inspect_status} -eq 0 ]]; then
              existing_digest="$(digest_from_inspection "${tag}" "${inspection}")"
              if [[ "${existing_digest}" != "${CANDIDATE_DIGEST}" ]]; then
                echo "Refusing to replace protected tag ${tag}: ${existing_digest} != ${CANDIDATE_DIGEST}." >&2
                exit 1
              fi
            elif [[ "${inspection}" != "ERROR: ${tag}: not found" ]]; then
              echo "Refusing promotion after unexpected registry error for ${tag}: ${inspection}" >&2
              exit 1
            fi
          done <<< "${PROTECTED_TAGS}"

          source_ref="${CANDIDATE_IMAGE}@${CANDIDATE_DIGEST}"
          promotion_args=()
          while IFS= read -r tag; do
            [[ -n "${tag}" ]] && promotion_args+=(--tag "${tag}")
          done <<< "${FINAL_TAGS}"
          require_current_branch_tip
          docker buildx imagetools create --prefer-index=false "${promotion_args[@]}" "${source_ref}"

          while IFS= read -r tag; do
            [[ -n "${tag}" ]] || continue
            inspection="$(docker buildx imagetools inspect "${tag}")"
            promoted_digest="$(digest_from_inspection "${tag}" "${inspection}")"
            test "${promoted_digest}" = "${CANDIDATE_DIGEST}"
          done <<< "${FINAL_TAGS}"
          echo "digest=${CANDIDATE_DIGEST}" >> "${GITHUB_OUTPUT}"

      - name: Record tested release evidence
        if: github.ref == 'refs/heads/aio-v0.9.2-web-stack-latest'
        shell: bash
        env:
          FINAL_TAGS: ${{ steps.tags.outputs.final_tags }}
        run: |
          {
            echo "## Published Crawl4AI AIO v${C4AI_VERSION}-r${AIO_IMAGE_REVISION}"
            echo
            echo "- Tested candidate: \`${{ steps.tags.outputs.candidate }}@${{ steps.build.outputs.digest }}\`"
            echo "- Promoted digest: \`${{ steps.promote.outputs.digest }}\`"
            echo "- Locked upstream index: \`${{ steps.provenance.outputs.index_digest }}\`"
            echo "- Locked upstream platform: \`${{ steps.provenance.outputs.platform_digest }}\`"
            echo "- Locked release commit: \`${{ steps.provenance.outputs.release_commit }}\`"
            echo "- Locked published source commit: \`${{ steps.provenance.outputs.published_source_commit }}\`"
            echo "- Locked SearXNG index: \`${{ steps.provenance.outputs.searxng_index_digest }}\`"
            echo "- Locked SearXNG platform: \`${{ steps.provenance.outputs.searxng_platform_digest }}\`"
            echo "- Locked SearXNG version: \`${{ steps.provenance.outputs.searxng_version }}\`"
            echo "- Locked SearXNG source commit: \`${{ steps.provenance.outputs.searxng_source_commit }}\`"
            echo "- Locked Camoufox package: \`${{ steps.provenance.outputs.camoufox_package_version }}\`"
            echo "- Locked Camoufox browser: \`${{ steps.provenance.outputs.camoufox_browser_version }}\`"
            echo "- Locked Camoufox browser SHA-256: \`${{ steps.provenance.outputs.camoufox_browser_sha256 }}\`"
            echo
            echo "### Final tags"
            while IFS= read -r tag; do
              [[ -n "${tag}" ]] && echo "- \`${tag}\`"
            done <<< "${FINAL_TAGS}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Record tested feature candidate evidence
        if: github.ref != 'refs/heads/aio-v0.9.2-web-stack-latest'
        shell: bash
        run: |
          {
            echo "## Verified Crawl4AI AIO feature candidate"
            echo
            echo "- Source ref: \`${GITHUB_REF}\`"
            echo "- Source commit: \`${GITHUB_SHA}\`"
            echo "- Candidate: \`${{ steps.tags.outputs.candidate }}@${{ steps.build.outputs.digest }}\`"
            echo "- Final tags promoted: \`no\`"
          } >> "${GITHUB_STEP_SUMMARY}"
