name: Verify Existing Crawl4AI AIO Candidate

on:
  workflow_dispatch:
    inputs:
      image_ref:
        description: Immutable GHCR candidate reference ending in @sha256:<digest>
        required: true
        type: string

permissions:
  contents: read
  packages: read

jobs:
  verify-candidate:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout verification suite
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Require an immutable image from this repository
        shell: bash
        env:
          IMAGE_REF: ${{ inputs.image_ref }}
        run: |
          set -euo pipefail
          pattern="^ghcr\\.io/${GITHUB_REPOSITORY}(:[A-Za-z0-9._-]+)?@sha256:[0-9a-f]{64}$"
          if [[ ! "${IMAGE_REF}" =~ ${pattern} ]]; then
            echo "image_ref must be an immutable ghcr.io/${GITHUB_REPOSITORY} digest reference." >&2
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify existing candidate without rebuilding
        id: smoke
        continue-on-error: true
        shell: bash
        env:
          SMOKE_ARTIFACT_DIR: ${{ runner.temp }}/aio-candidate-verification
          IMAGE_REF: ${{ inputs.image_ref }}
        run: |
          set -euo pipefail
          tests/docker/smoke-test.sh "${IMAGE_REF}"

      - name: Publish complete verification summary
        if: always()
        shell: bash
        run: |
          report="${RUNNER_TEMP}/aio-candidate-verification/report.md"
          if [[ -f "${report}" ]]; then
            cat "${report}" >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "Candidate verification did not produce a report." >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload complete verification evidence
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: aio-existing-candidate-verification-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/aio-candidate-verification
          if-no-files-found: error
          retention-days: 30

      - name: Require complete candidate verification
        if: always()
        shell: bash
        run: |
          test "${{ steps.smoke.outcome }}" = "success"
